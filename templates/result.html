<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Prediction Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f8f9fa;
margin:0;
}

.result-card{
width:600px;
}

</style>

</head>

<body>

<div class="result-card">

<div class="card shadow border-0 p-4 text-center">

<h2 class="mb-3">Prediction Result</h2>

<span class="badge {% if result.startswith('Fake') %}bg-danger{% else %}bg-success{% endif %} fs-6 px-4 py-2 mb-3">
{{ result }}
</span>

<div class="mb-3">

<div class="d-flex justify-content-between">
<span>Confidence</span>
<span>{{ confidence }}%</span>
</div>

<div class="progress mt-1">
<div class="progress-bar" style="width:{{ confidence }}%"></div>
</div>

</div>

{% if warning %}
<div class="alert alert-warning">
{{ warning }}
</div>
{% endif %}

<a href="/" class="btn btn-primary w-100">Check Another News</a>

</div>

</div>

</body>
</html>

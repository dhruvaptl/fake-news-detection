<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Fake News Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="topbar-inner">
                <a href="/" class="brand">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="brand-logo">
                    <span class="brand-text">AI Fake News Detector</span>
                </a>

                <div class="nav-actions">
                    <button class="btn btn-neutral" id="themeToggle" type="button">Dark Mode</button>
                    <a href="/" class="btn btn-outline">Home</a>
                    <a href="/dashboard" class="btn btn-primary">Dashboard</a>
                </div>
            </div>
        </header>

        <main class="login-page">
            <div class="container-main">
                <div class="login-card">
                    <div class="badge">Secure Access</div>
                    <h1 class="login-title">Welcome Back</h1>
                    <p class="login-subtitle">
                        Sign in to continue exploring prediction insights and fake news detection analytics.
                    </p>

                    <form>
                        <div class="form-group">
                            <label class="form-label" for="email">Email Address</label>
                            <input
                                type="email"
                                id="email"
                                class="form-input"
                                placeholder="Enter your email"
                            >
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password">Password</label>
                            <input
                                type="password"
                                id="password"
                                class="form-input"
                                placeholder="Enter your password"
                            >
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-primary">Login</button>
                            <a href="/" class="btn btn-neutral">Back Home</a>
                        </div>
                    </form>

                    <p class="helper-text">
                        Demo UI page for project presentation. Authentication backend can be added later if needed.
                    </p>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>

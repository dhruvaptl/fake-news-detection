<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Fake News Detector</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-sm border-0">

<div class="card-body p-4 p-md-5">

<div class="text-center mb-3">

<img src="{{ url_for('static', filename='images/logo.png') }}" width="70">

</div>

<h2 class="text-center mb-4">AI Fake News Detection</h2>

<form action="/predict" method="post">

<div class="mb-4">

<textarea
class="form-control form-control-lg"
name="news"
rows="7"
placeholder="Paste news article here..."
required></textarea>

</div>

<div class="d-grid">

<button class="btn btn-primary btn-lg">
Predict
</button>

</div>

</form>

<div class="text-center mt-3">

<a href="/dashboard" class="btn btn-secondary btn-lg">
View Dashboard
</a>

</div>

</div>

</div>

</div>

</div>


{% if history %}

<div class="row justify-content-center mt-5">

<div class="col-lg-10">

<h4 class="mb-3">Recent Predictions</h4>

<div class="table-responsive">

<table class="table table-striped table-bordered">

<thead class="table-light">

<tr>

<th>News</th>
<th>Result</th>
<th>Confidence</th>
<th>Date</th>

</tr>

</thead>

<tbody>

{% for row in history %}

<tr>

<td>{{ row[0][:80] }}...</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}%</td>
<td>{{ row[3] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

{% endif %}

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
